<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Campus Pulse | Twotable Engine</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="/static/css/dashboard.css?v=6" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>

<header class="app-header glass-panel">
  <div class="header-brand">
    <div class="brand-logo">CP</div>
    <h1>Campus Pulse</h1>
  </div>
  <div class="header-nav">
    <button class="nav-btn active" onclick="switchTab('map', this)" id="btn-tab-map">Map</button>
    <button class="nav-btn" onclick="switchTab('timeline', this)" id="btn-tab-timeline">Timeline</button>
    <button class="nav-btn" onclick="switchTab('analytics', this)" id="btn-tab-analytics">Analytics</button>
  </div>
  <div class="header-actions">
    <button class="liquid-button btn-primary" onclick="triggerIngest()">Sync Data</button>
  </div>
</header>

<main class="app-main">
  
  <section class="kpi-grid">
    <div class="glass-card kpi-item">
      <h3>Total Posts</h3>
      <div class="kpi-val" id="kpi-total">—</div>
    </div>
    <div class="glass-card kpi-item">
      <h3>Universities</h3>
      <div class="kpi-val" id="kpi-unis">—</div>
    </div>
    <div class="glass-card kpi-item">
      <h3>Technical</h3>
      <div class="kpi-val" id="kpi-tech">—</div>
    </div>
    <div class="glass-card kpi-item">
      <h3>Positive Sentiment</h3>
      <div class="kpi-val" id="kpi-sentiment">—</div>
    </div>
  </section>

  <div class="workspace-grid">
    
    <div class="workspace-content">
      
      <section id="tab-map" class="tab-content active">
        <div class="glass-panel main-panel">
          <div class="panel-header">
            <h2>Activity Topology</h2>
            <div class="map-legend">
              <span class="legend-item"><span class="dot brand-red"></span> Technical</span>
              <span class="legend-item"><span class="dot dark"></span> Non-Technical</span>
              <span class="legend-item"><span class="dot muted"></span> Unknown</span>
            </div>
          </div>
          <div id="map" class="map-container"></div>
        </div>
      </section>

      <section id="tab-timeline" class="tab-content">
        <div class="glass-panel main-panel">
          <div class="panel-header"><h2>Chronological Engagement</h2></div>
          <div class="chart-container large">
            <canvas id="chart-timeline"></canvas>
          </div>
        </div>
      </section>

      <section id="tab-analytics" class="tab-content">
        <div class="analytics-grid">
          <div class="glass-card">
            <h3>Lexicon Frequency</h3>
            <div class="chart-container"><canvas id="chart-keywords"></canvas></div>
          </div>
          <div class="glass-card">
            <h3>Sentiment Distribution</h3>
            <div class="chart-container"><canvas id="chart-sentiment"></canvas></div>
          </div>
        </div>
      </section>
      
    </div>

    <aside class="workspace-sidebar">
      
      <div class="glass-card highlight-card">
        <h3>What do you want to figure out?</h3>
        <select id="guided-explore" class="tw-input select-highlight" onchange="runGuidedExplore(this.value)">
          <option value="">Select an objective...</option>
          <option value="tech-hubs">Find top tech talent hubs</option>
          <option value="sentiment-risk">Identify negative sentiment risks</option>
          <option value="recent-activity">View recent chronological activity</option>
          <option value="reset">Clear all objectives</option>
        </select>
      </div>

      <div class="glass-card filter-card">
        <h3>Manual Parameters</h3>
        
        <div class="filter-group">
          <label>Date Range</label>
          <div class="date-flex">
            <input type="date" id="date-from" class="tw-input" />
            <input type="date" id="date-to" class="tw-input" />
          </div>
        </div>

        <div class="filter-group">
          <label>Engagement Type</label>
          <select id="filter-category" class="tw-input">
            <option value="">All Types</option>
            <option value="technical">Technical</option>
            <option value="non_technical">Non‑Technical</option>
            <option value="unknown">Unknown</option>
          </select>
        </div>

        <div class="filter-group">
          <label>Region</label>
          <select id="filter-region" class="tw-input">
            <option value="">All Regions</option>
            <option>London</option>
            <option>Scotland</option>
            <option>North West</option>
            <option>South West</option>
            <option>Yorkshire</option>
            <option>West Midlands</option>
            <option>East Midlands</option>
            <option>South East</option>
            <option>North East</option>
            <option>East of England</option>
            <option>Wales</option>
            <option>Northern Ireland</option>
            <option>Ireland</option>
          </select>
        </div>

        <div class="filter-group">
          <label>Sentiment</label>
          <select id="filter-sentiment" class="tw-input">
            <option value="">All Sentiments</option>
            <option value="positive">Positive</option>
            <option value="neutral">Neutral</option>
            <option value="negative">Negative</option>
          </select>
        </div>

        <div class="filter-actions">
          <button class="liquid-button btn-outline" onclick="applyFilters()">Apply Filters</button>
          <button class="liquid-button btn-outline" onclick="exportData('csv')">Export CSV</button>
        </div>
      </div>

      <div class="glass-card ranking-card">
        <h3>Top Institutions</h3>
        <div class="chart-container small">
          <canvas id="chart-top-unis"></canvas>
        </div>
      </div>

    </aside>
  </div>
</main>

<div id="toast" class="glass-card"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>

<script src="/static/js/api.js?v=6"></script>
<script src="/static/js/filters.js?v=6"></script>
<script src="/static/js/charts.js?v=6"></script>
<script src="/static/js/map.js?v=6"></script>
<script src="/static/js/export.js?v=6"></script>

</body>
</html>

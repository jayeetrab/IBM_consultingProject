services:
  # Standalone Backend Service (FastAPI)
  # NOTE: To use this, set "Root Directory" to "backend" in Render settings.
  - type: web
    name: ibm-campus-pulse-backend
    env: python
    buildCommand: "python -m pip install --upgrade pip setuptools wheel && pip install -r requirements.txt"
    startCommand: "gunicorn -k uvicorn.workers.UvicornWorker main:app --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.8
      - key: MONGODB_URL
        sync: false
      - key: DATABASE_NAME
        value: ibm_campus_pulse
      - key: GEMINI_API_KEY
        sync: false
